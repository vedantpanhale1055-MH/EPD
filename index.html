<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment Manager</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Animated background -->
    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div id="app-container">

        <!-- ===== LOGIN SCREEN ===== -->
        <div id="login-screen">
            <div class="brand-header">
                <div class="brand-icon">📚</div>
                <h1 class="brand-title">AssignTrack</h1>
                <p class="brand-sub">Classroom Assignment Manager</p>
            </div>

            <div id="role-selection" class="role-grid">
                <button id="student-login-btn" class="role-card role-student">
                    <span class="role-icon">🎓</span>
                    <span class="role-label">Student</span>
                    <span class="role-desc">View & track your assignments</span>
                </button>
                <button id="teacher-login-btn" class="role-card role-teacher">
                    <span class="role-icon">🏫</span>
                    <span class="role-label">Teacher</span>
                    <span class="role-desc">Create & manage assignments</span>
                </button>
            </div>

            <!-- Student Login Form -->
            <div id="student-login-form" class="auth-card hidden">
                <div class="auth-card-header student-header">
                    <h2>Student Verification</h2>
                    <p>Enter your details to continue</p>
                </div>

                <div id="input-fields" class="field-group">
                    <div class="field-wrap">
                        <label>Division</label>
                        <input id="login-div" type="text" placeholder="e.g. 1" />
                    </div>
                    <div class="field-wrap">
                        <label>Full Name</label>
                        <input id="login-name" type="text" placeholder="Your full name" />
                    </div>
                    <div class="field-wrap">
                        <label>Roll Number</label>
                        <input id="login-roll" type="text" placeholder="e.g. 12" />
                    </div>
                    <div class="field-wrap">
                        <label>Registered Email</label>
                        <input id="login-email" type="email" placeholder="yourname@email.com" />
                    </div>
                </div>

                <button id="verify-details-btn" class="btn btn-primary">Verify Details →</button>

                <div id="otp-request-container" class="hidden otp-section">
                    <div class="success-badge">✅ Details Matched!</div>
                    <button id="send-otp-btn" class="btn btn-primary">Send OTP to Email</button>
                </div>

                <div id="otp-verify-section" class="hidden otp-section">
                    <div class="field-wrap">
                        <label>Enter 4-digit OTP</label>
                        <input id="login-otp" type="text" placeholder="0000" maxlength="4" class="otp-input" />
                    </div>
                    <button id="final-login-btn" class="btn btn-success">Login Now →</button>
                </div>

                <button class="btn-text" onclick="location.reload()">← Back to home</button>
            </div>
        </div>

        <!-- ===== STUDENT VIEW ===== -->
        <div id="student-view" class="hidden">
            <div class="view-topbar">
                <div>
                    <h1 class="view-title">My Assignments</h1>
                    <p class="view-subtitle" id="student-greeting"></p>
                </div>
                <button id="student-logout-btn" class="btn-logout">Logout</button>
            </div>

            <div id="student-info" class="info-card student-info-card"></div>

            <div class="section-label">📋 Your Tasks</div>
            <div id="student-assignments-list"></div>
        </div>

        <!-- ===== TEACHER VIEW ===== -->
        <div id="teacher-view" class="hidden">
            <div class="view-topbar">
                <div>
                    <h1 class="view-title">Teacher Panel</h1>
                    <p class="view-subtitle">Manage divisions & assignments</p>
                </div>
                <button id="teacher-logout-btn" class="btn-logout">Logout</button>
            </div>

            <div class="teacher-form-card">
                <div class="form-card-header">
                    <span>➕ New Assignment</span>
                </div>
                <form id="teacher-form">
                    <div class="form-row">
                        <div class="field-wrap">
                            <label>Title</label>
                            <input id="assign-title" placeholder="Assignment title" required />
                        </div>
                        <div class="field-wrap">
                            <label>Subject</label>
                            <input id="assign-subject" placeholder="e.g. Math" required />
                        </div>
                    </div>
                    <div class="field-wrap">
                        <label>Description</label>
                        <textarea id="assign-desc" placeholder="Describe the assignment..." rows="3"></textarea>
                    </div>
                    <div class="form-row">
                        <div class="field-wrap">
                            <label>Due Date</label>
                            <input id="assign-due" type="date" />
                        </div>
                        <div class="field-wrap">
                            <label>Division</label>
                            <select id="assign-division">
                                <option value="1">Division 1</option>
                                <option value="2">Division 2</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-teacher-submit">Create Assignment</button>
                </form>
            </div>

            <div class="section-label">📂 All Assignments</div>
            <div id="teacher-assignments-list"></div>
            <div id="assignment-detail-view" class="hidden detail-view"></div>
        </div>

    </div>

    <!-- ===== TEACHER PIN MODAL ===== -->
    <div id="teacher-modal" class="modal-overlay hidden">
        <div class="modal-box">
            <div class="modal-icon">🔐</div>
            <h2 class="modal-title">Teacher Access</h2>
            <p class="modal-sub">Enter your 4-digit PIN to continue</p>
            <input id="teacher-pin-input" type="password" maxlength="4" placeholder="• • • •" class="pin-input" />
            <div class="modal-actions">
                <button id="modal-cancel-btn" class="btn btn-cancel">Cancel</button>
                <button id="modal-confirm-btn" class="btn btn-teacher-confirm">Login</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast hidden"></div>

    <script src="script.js"></script>
</body>
</html>
